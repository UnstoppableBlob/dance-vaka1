name: dance-academy

services:
  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dance_academy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dance_academy_dev}
      POSTGRES_DB: ${POSTGRES_DB:-dance_academy}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-dance_academy}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-dance_academy_dev}
      MINIO_API_CORS_ALLOW_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-dance_academy}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-dance_academy_dev}
      S3_BUCKET: ${S3_BUCKET:-dance-academy-media}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000
      $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/$${S3_BUCKET};
      /usr/bin/mc anonymous set none local/$${S3_BUCKET};
      "

volumes:
  postgres-data:
  minio-data:
